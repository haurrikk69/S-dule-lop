name: Record Stream

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'Stream URL'
        required: true
      duration:
        description: 'Duration e.g. 02:30:00'
        required: true
        default: '01:00:00'
      folder_id:
        description: 'GoFile Folder ID (optional)'
        required: false

  schedule:
    - cron: '10 3 16 7 *'

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Record and upload live
        env:
          GOFILE_TOKEN: ${{ secrets.GOFILE_TOKEN }}
          STREAM_URL: ${{ github.event_name == 'schedule' && secrets.SCHEDULED_STREAM_URL || github.event.inputs.stream_url }}
          FOLDER_ID: ${{ github.event_name == 'schedule' && secrets.SCHEDULED_FOLDER_ID || github.event.inputs.folder_id }}
          DURATION: ${{ github.event_name == 'schedule' && secrets.SCHEDULED_DURATION || github.event.inputs.duration }}
        run: |
          mkdir -p chunks

          DURATION_SECS=$(echo "$DURATION" | awk -F: '{ print ($1 * 3600) + ($2 * 60) + $3 }')
          START_TIME=$(date +%s)
          SESSION=0

          upload_file() {
            local FILE=$1
            echo "⬆ Uploading $FILE..."
            if [ -n "$FOLDER_ID" ]; then
              RESP=$(curl -s -X POST "https://upload.gofile.io/uploadFile" \
                -F "token=${GOFILE_TOKEN}" \
                -F "folderId=${FOLDER_ID}" \
                -F "file=@${FILE}")
            else
              RESP=$(curl -s -X POST "https://upload.gofile.io/uploadFile" \
                -F "token=${GOFILE_TOKEN}" \
                -F "file=@${FILE}")
            fi
            STATUS=$(echo $RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))")
            echo "$FILE → $STATUS"
            rm "$FILE"
          }

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))
            REMAINING=$(( DURATION_SECS - ELAPSED ))

            if [ $REMAINING -le 0 ]; then
              echo "✅ Total duration reached, stopping."
              break
            fi

            SESSION=$((SESSION + 1))
            CHUNK_DURATION=$(( REMAINING < 60 ? REMAINING : 60 ))
            echo "▶ Session $SESSION starting — ${REMAINING}s remaining, recording ${CHUNK_DURATION}s chunk..."

            ffmpeg -i "$STREAM_URL" \
              -c copy \
              -t $CHUNK_DURATION \
              "chunks/session_${SESSION}.ts" || true

            if [ -f "chunks/session_${SESSION}.ts" ]; then
              upload_file "chunks/session_${SESSION}.ts" &
            fi

            echo "⚠ ffmpeg stopped, restarting in 1 second..."
            sleep 1
          done

          echo "⏳ Waiting for remaining uploads to finish..."
          wait
          echo "✅ All uploads done."
