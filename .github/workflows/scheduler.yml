name: Scheduler

on:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  actions: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check time and trigger recording
        env:
          SCHEDULED_TIME: ${{ secrets.SCHEDULED_TIME }}
        run: |
          CURRENT_EPOCH=$(date -u +%s)
          SCHEDULED_EPOCH=$(date -u -d "$SCHEDULED_TIME" +%s)
          DIFF=$(( CURRENT_EPOCH - SCHEDULED_EPOCH ))
          echo "Current UTC:  $(date -u +'%Y-%m-%d %H:%M')"
          echo "Scheduled:    $SCHEDULED_TIME"
          if [ "$DIFF" -ge 0 ] && [ "$DIFF" -lt 300 ]; then
            echo "✅ Time matched! Triggering recording..."
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/record.yml/dispatches" \
              -d '{"ref":"main"}'
          else
            echo "⏳ Not yet. ${DIFF}s difference."
          fi
